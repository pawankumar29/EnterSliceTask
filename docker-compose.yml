version: "3.8"
services:
  mysql:
    image: mysql:8.4
    container_name: enterslice_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-support_sla}
      MYSQL_USER: ${MYSQL_USER:-support_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-support_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: enterslice_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: ${DB_HOST:-mysql}
      PMA_PORT: ${DB_PORT:-3306}
      PMA_USER: ${MYSQL_USER:-support_user}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-support_password}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"

  backend:
    build: ./backend
    container_name: enterslice_backend
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${MYSQL_DATABASE:-support_sla}
      DB_USER: ${MYSQL_USER:-support_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-support_password}
      PORT: ${BACKEND_PORT:-4000}
    ports:
      - "${BACKEND_PORT:-4000}:${BACKEND_PORT:-4000}"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data: